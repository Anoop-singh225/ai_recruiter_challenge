ai_usage_summary: |
  Used Gemini for coding assistance and Claude for design discussion and code review.
  No candidate data was shared with any closed external LLMs.

methodology_summary: |
  Rule-based ranker with explicit reasoning capture. Five scoring components
  (skills, title+career, experience years, location, education) combined with
  a multiplicative behavioral-signal modifier. Includes a high-precision anomaly
  and honeypot detector to filter trap candidates (e.g. expert skill with 0 dur,
  YoE mismatch, Krutrim/Sarvam AI tenure dates). Ties broken using candidate_id ascending.

declarations:
